services:
  sync-server:
    build:
      context: ../..
      dockerfile: infra/docker/sync-server.Dockerfile
    image: self-hosted-sync-server:latest
    env_file:
      - .env
    environment:
      SYNC_STORAGE_BACKEND: ${SYNC_STORAGE_BACKEND:-postgres}
      POSTGRES_HOST: db
    ports:
      - "${SYNC_SERVER_PORT:-8787}:8787"
    depends_on:
      migrate:
        condition: service_completed_successfully
      object-store:
        condition: service_started

  migrate:
    image: self-hosted-sync-server:latest
    env_file:
      - .env
    environment:
      SYNC_STORAGE_BACKEND: ${SYNC_STORAGE_BACKEND:-postgres}
      POSTGRES_HOST: db
    command: ["npm", "run", "db:migrate"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sync}
      POSTGRES_DB: ${POSTGRES_DB:-sync}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sync} -d ${POSTGRES_DB:-sync}"]
      interval: 5s
      timeout: 5s
      retries: 20

  object-store:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
