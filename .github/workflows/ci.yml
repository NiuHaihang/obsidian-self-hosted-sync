name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sync
          POSTGRES_PASSWORD: sync
          POSTGRES_DB: sync
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sync -d sync"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit/Integration tests
        env:
          SYNC_STORAGE_BACKEND: memory
        run: npm test

      - name: PostgreSQL regression tests
        env:
          SYNC_STORAGE_BACKEND: postgres
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_USER: sync
          POSTGRES_PASSWORD: sync
          POSTGRES_DB: sync
        run: |
          npm run db:migrate
          npm run test:pg
