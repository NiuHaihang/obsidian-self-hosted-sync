openapi: 3.0.3
info:
  title: Self-Hosted Obsidian Sync API
  version: 0.1.0
  description: >-
    REST contract for merge-first multi-client sync with tombstone-based safe deletion.
servers:
  - url: http://localhost:8787
tags:
  - name: health
  - name: clients
  - name: sync
  - name: conflicts

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness check
      operationId: getHealthz
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readyz:
    get:
      tags: [health]
      summary: Readiness check
      operationId: getReadyz
      responses:
        '200':
          description: Dependencies are ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  db:
                    type: string
                    example: up
                  objectStore:
                    type: string
                    example: up

  /v1/spaces/{spaceId}/clients:
    post:
      tags: [clients]
      summary: Register client device
      operationId: registerClient
      parameters:
        - $ref: '#/components/parameters/spaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterClientRequest'
      responses:
        '201':
          description: Client registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterClientResponse'
        '401':
          $ref: '#/components/responses/AuthFailed'

  /v1/spaces/{spaceId}/changes:
    get:
      tags: [sync]
      summary: Pull changes since a version
      operationId: pullChanges
      parameters:
        - $ref: '#/components/parameters/spaceId'
        - in: query
          name: from_version
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 200
        - in: query
          name: cursor
          required: false
          schema:
            type: string
        - in: query
          name: wait_ms
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 30000
            default: 0
      responses:
        '200':
          description: Incremental changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullChangesResponse'
        '401':
          $ref: '#/components/responses/AuthFailed'
        '409':
          $ref: '#/components/responses/VersionTooOld'

    post:
      tags: [sync]
      summary: Push local changes with merge preconditions
      operationId: pushChanges
      parameters:
        - $ref: '#/components/parameters/spaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushChangesRequest'
      responses:
        '200':
          description: Changes accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushChangesResponse'
        '401':
          $ref: '#/components/responses/AuthFailed'
        '409':
          description: Merge conflict or version too old
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '412':
          $ref: '#/components/responses/ExpectedHeadMismatch'
        '422':
          $ref: '#/components/responses/InvalidChangeset'

  /v1/spaces/{spaceId}/conflicts/{conflictSetId}:
    get:
      tags: [conflicts]
      summary: Query conflict details
      operationId: getConflictSet
      parameters:
        - $ref: '#/components/parameters/spaceId'
        - $ref: '#/components/parameters/conflictSetId'
      responses:
        '200':
          description: Conflict detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictSetResponse'
        '401':
          $ref: '#/components/responses/AuthFailed'
        '404':
          description: Conflict set not found

  /v1/spaces/{spaceId}/conflicts/{conflictSetId}/resolutions:
    post:
      tags: [conflicts]
      summary: Resolve conflicts and create merged commit
      operationId: resolveConflictSet
      parameters:
        - $ref: '#/components/parameters/spaceId'
        - $ref: '#/components/parameters/conflictSetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveConflictsRequest'
      responses:
        '200':
          description: Conflict resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveConflictsResponse'
        '401':
          $ref: '#/components/responses/AuthFailed'
        '409':
          $ref: '#/components/responses/MergeConflict'
        '412':
          $ref: '#/components/responses/ExpectedHeadMismatch'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    spaceId:
      in: path
      name: spaceId
      required: true
      schema:
        type: string
        format: uuid
    conflictSetId:
      in: path
      name: conflictSetId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    AuthFailed:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error:
                  code: AUTH_FAILED
                  message: Access token invalid or expired
                  retryable: false
    MergeConflict:
      description: Merge conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                error:
                  code: MERGE_CONFLICT
                  message: Conflict detected, resolve with conflict_set_id
                  retryable: false
                  details:
                    conflict_set_id: 00000000-0000-0000-0000-000000000000
    VersionTooOld:
      description: Base version is too old for incremental merge
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ExpectedHeadMismatch:
      description: Expected head mismatch
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InvalidChangeset:
      description: Invalid changeset payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RegisterClientRequest:
      type: object
      required: [device_id, client_name]
      properties:
        device_id:
          type: string
        client_name:
          type: string
        capabilities:
          type: array
          items:
            type: string
        last_known_version:
          type: integer
          format: int64

    RegisterClientResponse:
      type: object
      required: [client_id, access_token, refresh_token, server_head]
      properties:
        client_id:
          type: string
          format: uuid
        access_token:
          type: string
        refresh_token:
          type: string
        server_head:
          type: integer
          format: int64
        snapshot_required:
          type: boolean

    ChangeOperation:
      type: object
      required: [op_type, path]
      properties:
        op_type:
          type: string
          enum: [upsert, delete, rename]
        path:
          type: string
        new_path:
          type: string
        content_hash:
          type: string
        blob_ref:
          type: string
        content_b64:
          type: string
          description: Base64 payload. For `content_encoding=utf8`, decode to UTF-8 text. For `content_encoding=binary_base64`, treat as raw binary bytes.
        content_encoding:
          $ref: '#/components/schemas/ContentEncoding'
          description: Optional content encoding for `upsert`. Defaults to `utf8` when omitted.

    ContentEncoding:
      type: string
      enum: [utf8, binary_base64]
      description: >-
        `utf8` means `content_b64` decodes to UTF-8 string; `binary_base64` means
        `content_b64` is raw binary bytes encoded as base64.

    PullChangesResponse:
      type: object
      required: [head_version, changes, has_more]
      properties:
        head_version:
          type: integer
          format: int64
        changes:
          type: array
          items:
            type: object
            required: [version, author_client_id, ops, ts]
            properties:
              version:
                type: integer
                format: int64
              author_client_id:
                type: string
                format: uuid
              ts:
                type: string
                format: date-time
              ops:
                type: array
                items:
                  $ref: '#/components/schemas/ChangeOperation'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    PushChangesRequest:
      type: object
      required:
        [client_id, idempotency_key, base_version, expected_head, ops]
      properties:
        client_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
        base_version:
          type: integer
          format: int64
        expected_head:
          type: integer
          format: int64
        ops:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ChangeOperation'

    PushChangesResponse:
      type: object
      required: [applied, new_head_version, merge_result]
      properties:
        applied:
          type: boolean
        new_head_version:
          type: integer
          format: int64
        merge_result:
          type: string
          enum: [fast_forward, merged, conflict]
        conflict_set_id:
          type: string
          format: uuid
          nullable: true

    ConflictItem:
      type: object
      required: [path, conflict_type]
      properties:
        path:
          type: string
        conflict_type:
          type: string
          enum:
            [content_diverged, delete_vs_modify, rename_conflict, binary_conflict]
        base_blob_ref:
          type: string
          nullable: true
        server_blob_ref:
          type: string
          nullable: true
        client_blob_ref:
          type: string
          nullable: true

    ConflictSetResponse:
      type: object
      required: [conflict_set_id, status, base_version, head_version, items]
      properties:
        conflict_set_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, resolved]
        base_version:
          type: integer
          format: int64
        head_version:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: '#/components/schemas/ConflictItem'

    ResolveConflictsRequest:
      type: object
      required: [expected_head, resolutions]
      properties:
        expected_head:
          type: integer
          format: int64
        resolutions:
          type: array
          minItems: 1
          items:
            type: object
            required: [path, strategy]
            properties:
              path:
                type: string
              strategy:
                type: string
                enum: [ours, theirs, manual]
              content_b64:
                type: string
                nullable: true
              content_encoding:
                $ref: '#/components/schemas/ContentEncoding'
                nullable: true
              blob_ref:
                type: string
                nullable: true

    ResolveConflictsResponse:
      type: object
      required: [resolved, new_head_version]
      properties:
        resolved:
          type: boolean
        new_head_version:
          type: integer
          format: int64

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, retryable]
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
            details:
              type: object
              additionalProperties: true
            trace_id:
              type: string

security:
  - bearerAuth: []
